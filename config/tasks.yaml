team_huddle:
  description: >
    This is the initial huddle of all the agents:
    Senior Security Engineer, Chief Privacy Officer, AI Ethics & Safety Director, Lead QA Engineer and the Chief Governance Officer.

    Chief Governance Officer will lead the discussion.
    Everyone will come into one decision on what is the complexity of the AI instructions: ''''{instruction}'''
    Result is either simple or complex.

  expected_output: >
    The complexity of the AI instruction.


security_audit_task:
  description: >
    
    Focus mainly on your security audit.
    
    *SECURITY AUDIT - OWASP LLM TOP 10 & ISO 42001**

    Review the AI instruction for security vulnerabilities.
    
    AI INSTRUCTION: {instruction}
       
    AUDIT CHECKLIST:
    [S1] Prompt Injection & Jailbreak Resilience
        → Verify strict instructions forbid executing user overrides
        → Confirm protections against encoded/obfuscated inputs
        → Check explicit refusal mechanisms
    
    [S2] Hardcoded Sensitive Data Check  
        → Scan for API keys, tokens, credentials
        → Identify exposed endpoints or connection strings
        → Flag database schemas or system architecture details
    
    [S3] Role-Based Access & Authorization
        → Validate tool execution is scoped to user roles
        → Confirm authentication/authorization controls
        → Ensure least privilege principle
    
    [S4] Resource Exhaustion & Rate Limiting
        → Check frequency/volume limits on external calls
        → Verify safeguards against infinite response generation
        → Confirm protection against recursive loops
    
    [S5] Tool/API Argument Validation
        → Validate strict schema validation for external calls
        → Ensure argument sanitization before execution
        → Confirm injection prevention for tool parameters

    {CATEGORY_GUIDELINES}    
    {AUDIT_OUTPUT_FORMAT}

    If the AI instruction is simple, don't over complicate and don't ask other Specialists.
    If its complex, and you think it overlaps with privacy or QA:
      - Delegate to Chief Privacy Officer or Lead QA Engineer.
      - Discuss what is the final category and severity.
    
  expected_output: >
    Structured privacy audit findings with compliance gaps

privacy_audit_task:
  description: >

    Focus mainly on your privacy audit.
    
    Review the AI instruction for privacy compliance.
    
    AI INSTRUCTION: {instruction}
    
    AUDIT CHECKLIST:
    [P1] PII/Secrets Output Prevention
        → Verify instructions forbid outputting PII (names, emails, addresses, IDs)
        → Confirm system secrets are protected
        → Check refusal mechanisms when users provide PII
    
    [P2] Data Minimization & Purpose Limitation
        → Validate prohibition of cross-session data access
        → Confirm external DB queries require authorization
        → Ensure data used ONLY for specified task
    
    [P3] Ephemeral Data & Right to Erasure
        → Check for stateless/ephemeral treatment
        → Verify avoidance of persistent data generation
        → Confirm GDPR Art. 17 compliance design
    
    [P4] Self-Correction & PII Validation
        → Validate presence of output self-review instructions
        → Confirm LLM checks for PII leakage before finalization
        → Ensure validation loop is explicit
    
    [P5] PII Input Sanitization & Masking
        → Verify immediate PII sanitization on detection
        → Check redaction mechanisms ([REDACTED] or tokens)
        → Confirm sanitization before task processing
          
    OUTPUT FORMAT: Same structure as Security Audit

    If the AI instruction is simple, don't over complicate and don't ask other Specialists.
    Senior Security Engineer might ask you about security audit that overlaps with privacy, provide your perspective and help decide final category and severity.
      
  expected_output: >
    Structured list of privacy guardrails.

rai_audit_task:
  description: >

    Focus mainly on your safety and ethics audit.
    
    Review the AI instruction for ethical and safety compliance.
    
    AI INSTRUCTION: {instruction}    
    
    AUDIT CHECKLIST:
    [R1] Systemic Bias & Fairness Mitigation
        → Verify active bias detection mechanisms
        → Confirm instructions to mitigate bias in outputs
        → Check fairness testing across protected characteristics
    
    [R2] Prohibited Content (Critical Check)
        → SCAN for instructions introducing discrimination
        → Identify requirements mandating bias against protected groups
        → Flag language systematically disadvantaging demographics
    
    [R3] Harmful Content & Policy Violation Filters
        → Validate enumeration of prohibited content:
          • Illegal activities (violence, exploitation, terrorism)
          • Self-harm encouragement or suicide ideation
          • Hate speech targeting protected characteristics
          • Misinformation or manipulation content
    
    [R4] Human-in-the-Loop & Safety Lockdowns
        → Verify "halt" conditions for mandatory human review
        → Confirm scope confinement preventing:
          • Medical diagnosis without oversight
          • Financial advice without disclosures
          • Legal conclusions without attorney review
    
    [R5] Audit Trail & Explanation Integrity (XAI)
        → Check Chain-of-Thought (CoT) requirements
        → Verify confidence score generation
        → Confirm outputs designed for audit logging
    
    [R6] Adversarial Input Identification
        → Verify instructions to identify prompt injection attempts
        → Confirm standardized refusal responses
        → Check logging/flagging for bypass attempts
          
    OUTPUT FORMAT: Same structure as Security Audit

    If the AI instruction is simple, don't over complicate and don't ask other Specialists.
        
  expected_output: >
    Structured RAI audit findings with ethical gaps

qa_audit_task:
  description: >

    Focus mainly on your QA audit.
    
    Review the AI instruction for quality and reliability.
    
    AI INSTRUCTION: {instruction}
    
    AUDIT CHECKLIST:
    [Q1] Context & Negative Constraint Confinement
        → Verify clear agent identity and role definition
        → Confirm explicit knowledge/action boundaries
        → Validate negative constraints (MUST NOT list)
        → Check scope creep prevention
    
    [Q2] Output Control & Schema Enforcement
        → Validate strict output format (JSON/XML schema)
        → Confirm token budget or length limits
        → Check structured output requirements
        → Verify format validation instructions
    
    [Q3] Adversarial Resilience & Self-Correction
        → Verify internal self-review mechanisms
        → Confirm output validation against constraints
        → Check adversarial testing requirements:
          • Obfuscated input handling (Base64, ROT13, unicode)
          • Encoded malicious prompt detection
          • Contextual integrity verification
        → Validate error recovery instructions
    
    [Q4] Consistency & Determinism (Optional)
        → Check temperature/sampling specifications
        → Verify consistent outputs for identical inputs
        → Validate absence of unnecessary randomness
    
    [Q5] Maintainability & Documentation (Optional)
        → Assess prompt structure clarity
        → Verify inline documentation of constraints
        → Check version control compatibility
          
    OUTPUT FORMAT: Same structure as Security Audit

    If the AI instruction is simple, don't over complicate and don't ask other Specialists.
    Senior Security Engineer might ask you about security audit that overlaps with QA, provide your perspective and help decide final category and severity.
        
  expected_output: >
    Structured QA audit findings with quality gaps

cost_profiling_task:
  description: >
    **PHASE 2b: COST PROFILING**

    Review the current AI instruction and provide tier recommendation.
    
    INSTRUCTION TO REVIEW:
    '''{instruction}'''

    1. What tier is needed to IMPLEMENT the current guardrails
    2. Recommended model class
    3. Estimated cost per 1M tokens
    4. Expected latency
    5. Justification based on complexity of controls

  expected_output: >
    Tier recommendation with cost/latency estimates.

report_synthesis_task:
  description: >
    **FINAL COMPLIANCE REPORT SYNTHESIS**
    
    You are receiving audit findings from Security, Privacy, RAI, and QA specialists.
    
    **YOUR MISSION:**
    1. **Review All Findings**: Examine outputs from all audit agents
    2. **Eliminate Duplicates**: If 2+ agents flag the same issue (same location quote), merge into ONE guardrail
    3. **Resolve Conflicts**: If agents disagree on severity, ASK them for justification
       - Example: "Security Agent, why is the API Key issue 'Medium'? Privacy marked it 'Critical'."
    4. **Assign Final Ratings**: You have veto power on severity and category
    5. **Generate Recommendations**: Provide 3-5 strategic, actionable recommendations
    
    **DEDUPLICATION RULES:**
    - Compare the 'location' field: if quotes overlap >80%, it's a duplicate
    - Keep the highest severity rating
    - Use the most specific category (Security > Privacy > RAI > QA)
    
    **SEVERITY ASSESSMENT:**
    - Critical: Regulatory violation risk, immediate breach potential, safety failure
    - High: Significant compliance gap, moderate breach risk, ethical concern
    - Medium: Best practice deviation, minor gap
    - Low: Documentation issue, minor improvement

    {CATEGORY_GUIDELINES}   
    {AUDIT_OUTPUT_FORMAT}
    
    **OUTPUT FORMAT:**
    Pure JSON matching this structure (NO markdown, NO code blocks):
    
    {{
      "guardrails": [
        {{
          "name": "Descriptive Guardrail Name",
          "category": "Security|Privacy|Responsible AI|QA|Scope Control|Input Validation|Output Control",
          "severity": "Critical|High|Medium|Low",
          "complexity_tier": 1-5,
          "description": "What this guardrail prevents or enforces",
          "mechanism": "Technical implementation approach",
          "triggers": ["keyword1", "keyword2"],
          "enforcement": "Single action verb",
          "location": "Quote from prompt or empty string"
        }}
      ],
      "recommendations": [
        "Specific recommendation 1 with measurable outcome",
        "Specific recommendation 2 addressing compliance gap",
        "Specific recommendation 3 for quality improvement"
      ],
      "tiering_strategy": null
    }}
    
    {CRITICAL_JSON_RULES}
    
    AI INSTRUCTION BEING AUDITED:
    {request.instruction}
    
  expected_output: >
   Valid JSON matching GuardrailAnalysis schema