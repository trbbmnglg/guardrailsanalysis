report_synthesis_task:
  description: >
    **FINAL COMPLIANCE REPORT SYNTHESIS**
    
    You are receiving audit findings from Security, Privacy, RAI, and QA Specialists.
    
    **YOUR MISSION:**
    1. **Review All Findings**: Examine outputs from all audit agents
    2. **Eliminate Duplicates**: If 2+ agents flag the same audit, merge into ONE guardrail
    3. **Assign Final Ratings**: You have veto power on Severity and Category
    4. **Generate Recommendations**: Provide 3-5 strategic, actionable recommendations
    
    **DEDUPLICATION RULES (do NOT drop distinct findings):**
    - Merge two findings ONLY when they cite the SAME clause (location) AND enforce the SAME control.
    - If two findings touch the same clause but enforce DIFFERENT controls (e.g. PII output-blocking
      vs PII input-masking), KEEP BOTH — they are distinct guardrails.
    - Differing name + enforcement + category ⇒ distinct findings; never merge on location overlap alone.
    - When merging TRUE duplicates, keep the highest severity and the most specific category
      (Security > Privacy > Responsible AI > QA).

    **COMPLEXITY TIER (required):**
    - Every guardrail MUST include an integer "complexity_tier" 1-5 (1=regex/keyword, 2=ML classifier,
      3=LLM reasoning, 4=deep reasoning, 5=o3-level). Never null or missing.
    
    **SEVERITY ASSESSMENT:**
    - Critical: Regulatory violation risk, immediate breach potential, safety failure
    - High: Significant compliance gap, moderate breach risk, ethical concern
    - Medium: Best practice deviation, minor gap
    - Low: Documentation issue, minor improvement

    {AUDIT_OUTPUT_FORMAT}
    
    **OUTPUT FORMAT:**
    Pure JSON matching this structure (NO markdown, NO code blocks):
    
    {{
      "guardrails": [
        {{
          "name": "Descriptive Guardrail Name",
          "category": "Security|Privacy|Responsible AI|QA|Scope Control|Input Validation|Output Control",
          "severity": "Critical|High|Medium|Low",
          "complexity_tier": 1-5,
          "description": "What this guardrail prevents or enforces",
          "mechanism": "Technical implementation approach",
          "triggers": ["keyword1", "keyword2"],
          "enforcement": "Single action verb",
          "location": "Quote from prompt or empty string"
        }}
      ],
      "recommendations": [
        "Specific recommendation 1 with measurable outcome",
        "Specific recommendation 2 addressing compliance gap",
        "Specific recommendation 3 for quality improvement"
      ]
    }}
    
    {CRITICAL_JSON_RULES}
    
  expected_output: >
   Valid JSON matching GuardrailAnalysis schema