<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardrails Analysis</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Configuration -->
    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ['"Inter"', 'sans-serif'],
                heading: ['"Plus Jakarta Sans"', 'sans-serif'],
                mono: ['"JetBrains Mono"', 'monospace'],
              },
              boxShadow: {
                'glass': '0 4px 30px rgba(0, 0, 0, 0.1)',
              }
            }
          }
        }
    </script>
    
    <!-- Custom Styles -->
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        .loading-bar-striped {
            background-image: linear-gradient(
                45deg,
                rgba(255, 255, 255, 0.15) 25%,
                transparent 25%,
                transparent 50%,
                rgba(255, 255, 255, 0.15) 50%,
                rgba(255, 255, 255, 0.15) 75%,
                transparent 75%,
                transparent
            );
            background-size: 1rem 1rem;
        }

        /* Hide scrollbar for clean textarea but keep functionality */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        textarea::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        
        /* Fade In Animation */
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* PDF specific overrides */
        .html2pdf__page-break { margin-top: 1rem; }
    </style>
    
    <!-- Error Handling -->
    <script>
        window.addEventListener('unhandledrejection', function(event) {
            console.error('🚨 Unhandled Promise Rejection:', event.reason);
            event.preventDefault();
            if (!event.reason?.message?.includes('message channel closed')) {
                const errorState = document.getElementById('errorState');
                const errorMessage = document.getElementById('errorMessage');
                if (errorState && errorMessage) {
                    errorMessage.textContent = 'An unexpected error occurred. Please try again.';
                    errorState.classList.remove('hidden');
                }
            }
        });
        window.addEventListener('error', function(event) {
            if (event.message.includes('Extension context') || event.message.includes('message channel')) {
                event.preventDefault(); return;
            }
            console.error('🚨 Global Error:', event.error);
        });
    </script>
    
    <!-- Application Scripts -->
    <script src="/static/disclaimer-modal.js"></script>
    <script src="/static/latency-profiler.js"></script>
    <script src="/static/green-ai-monitor.js"></script>
    <script src="/static/guardrails-analyzer.js" defer></script>
</head>

<body class="bg-slate-50 min-h-screen text-slate-900 selection:bg-indigo-100 selection:text-indigo-700 pb-20">

    <!-- ZONE A: THE COMMAND DECK (Sticky Header) -->
    <header class="sticky top-0 z-40 w-full glass-panel border-b border-slate-200 shadow-sm transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Branding -->
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-600 to-blue-600 flex items-center justify-center shadow-md shadow-indigo-200">
                        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-slate-900 tracking-tight leading-none">Guardrails Analysis</h1>
                        <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">v3.0 Itadori</span>
                    </div>
                </div>

                <!-- Status Indicators -->
                <div class="hidden md:flex items-center gap-6">
                    <div class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-50 border border-emerald-100">
                        <span class="relative flex h-2 w-2">
                          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                          <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                        </span>
                        <span class="text-xs font-bold text-emerald-700 uppercase tracking-wide">System Operational</span>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Engine</div>
                        <div class="text-xs font-mono font-bold text-slate-700">Llama-3.3-70B</div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- ZONE B: INPUT STUDIO (Two Column Layout) -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-12">
            
            <!-- LEFT COLUMN: Instruction Editor (8 Cols) -->
            <div class="lg:col-span-8 flex flex-col gap-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full hover:shadow-md transition-shadow">
                    <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
                        <h2 class="font-heading font-bold text-slate-800 text-sm uppercase tracking-wide flex items-center gap-2">
                            <svg class="w-4 h-4 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                            Agent Instruction
                        </h2>
                        <span class="text-xs text-slate-400 font-mono"><span id="charCount">0</span> chars</span>
                    </div>
                    <div class="p-0 flex-grow relative">
                        <textarea id="instructionInput" 
                            class="w-full h-[450px] p-6 resize-none focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500/10 text-sm font-mono leading-relaxed text-slate-600 bg-white"
                            placeholder="Paste your System Prompt or Agent Persona here...

Example:
Role: Financial Advisor Agent
Goal: Provide investment advice based on user risk profile.
Constraint: Never provide tax advice. Always disclaim that you are an AI."></textarea>
                        <!-- Gentle hint overlay -->
                        <div class="absolute bottom-4 right-6 pointer-events-none opacity-40">
                            <svg class="w-12 h-12 text-slate-200" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Configuration Deck (4 Cols) -->
            <div class="lg:col-span-4 flex flex-col gap-6">
                
                <!-- 1. API Configuration Card -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="px-5 py-3 border-b border-amber-100 bg-amber-50/60 flex items-center gap-2">
                        <svg class="w-4 h-4 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
                        <h3 class="font-heading font-bold text-amber-900 text-sm uppercase tracking-wide">Authentication</h3>
                    </div>
                    <div class="p-5 space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 ml-1">HuggingFace Token</label>
                            <input type="password" id="apiKey" 
                                class="w-full px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50 text-sm focus:ring-2 focus:ring-amber-400 focus:border-amber-400 transition-all font-mono"
                                placeholder="hf_...">
                        </div>
                        
                        <!-- Modern Amber Toggle (Static HTML) -->
                        <div class="flex items-center justify-between">
                            <label class="flex items-center gap-3 cursor-pointer group select-none">
                                <div class="relative inline-flex items-center">
                                    <input type="checkbox" id="saveApiKey" class="sr-only peer">
                                    <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-amber-500 transition-colors"></div>
                                </div>
                                <span class="text-xs text-slate-600 font-medium group-hover:text-amber-700 transition-colors">Remember</span>
                            </label>
                            <button id="clearApiKey" class="text-[10px] font-bold text-slate-400 hover:text-red-500 uppercase tracking-wide transition-colors">Clear</button>
                        </div>
                    </div>
                </div>

                <!-- 2. Analysis Settings Card -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden" id="analysisControlsContainer">
                    <div class="px-5 py-3 border-b border-indigo-100 bg-indigo-50/60 flex items-center gap-2">
                         <svg class="w-4 h-4 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                        <h3 class="font-heading font-bold text-indigo-900 text-sm uppercase tracking-wide">Analysis Config</h3>
                    </div>
                    <div class="p-1 space-y-1">
                        
                        <!-- Toggle 1: Deep Scan -->
                        <label class="flex items-center justify-between p-3 hover:bg-slate-50 rounded-lg cursor-pointer group transition-colors">
                            <div class="flex flex-col">
                                <span class="text-sm font-bold text-slate-700 group-hover:text-indigo-600 transition-colors">Deep Compliance</span>
                                <span class="text-[10px] text-slate-400">Strict regex & RAG checks (this is future feature)</span>
                            </div>
                            <div class="relative inline-flex items-center">
                                <input type="checkbox" id="enableRagDeepScan" class="sr-only peer" checked>
                                <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600 transition-colors"></div>
                            </div>
                        </label>

                         <!-- Toggle 2: Cost Profiling -->
                         <label class="flex items-center justify-between p-3 hover:bg-slate-50 rounded-lg cursor-pointer group transition-colors">
                            <div class="flex flex-col">
                                <span class="text-sm font-bold text-slate-700 group-hover:text-indigo-600 transition-colors">FinOps Profiling</span>
                                <span class="text-[10px] text-slate-400">Cost & Latency estimate</span>
                            </div>
                            <div class="relative inline-flex items-center">
                                <input type="checkbox" id="aiProfilingToggle" class="sr-only peer" checked>
                                <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600 transition-colors"></div>
                            </div>
                        </label>
                      
                         <!-- Toggle 3: Green AI -->
                         <label class="flex items-center justify-between p-3 hover:bg-slate-50 rounded-lg cursor-pointer group transition-colors">
                            <div class="flex flex-col">
                                <span class="text-sm font-bold text-slate-700 group-hover:text-indigo-600 transition-colors">Green AI Analysis</span>
                                <span class="text-[10px] text-slate-400">Compute energy score and ~kwh/1k reqs</span>
                            </div>
                            <div class="relative inline-flex items-center">
                                <input type="checkbox" id="greenAIToggle" class="sr-only peer" checked>
                                <div class="w-9 h-5 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-indigo-600 transition-colors"></div>
                            </div>
                        </label>
                    </div>
                    
                    <!-- Primary Action -->
                    <div class="p-5 border-t border-slate-100 bg-slate-50">
                        <button id="analyzeBtn" class="w-full flex items-center justify-center gap-2 bg-slate-900 hover:bg-indigo-600 text-white font-bold py-3 px-6 rounded-xl shadow-lg hover:shadow-indigo-500/30 transition-all duration-300 transform active:scale-[0.98]">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            Run Audit
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- ZONE C: INSIGHT ENGINE (Results) -->
        <div id="loadingState" class="hidden animate-in fade-in zoom-in duration-300 mb-8">
            <div class="bg-white rounded-2xl shadow-lg border border-indigo-100 p-12 text-center">
                <div class="relative w-20 h-20 mx-auto mb-6">
                    <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-indigo-600 rounded-full border-t-transparent animate-spin"></div>
                </div>
                <h3 class="text-xl font-bold text-slate-900 mb-2">Auditing Agents...</h3>
                <p class="text-slate-500 mb-8" id="progressText">Initializing CrewAI Swarm</p>
                <div class="max-w-md mx-auto h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-indigo-600 loading-bar-striped animate-pulse transition-all duration-300" style="width: 5%"></div>
                </div>
            </div>
        </div>

        <div id="errorState" class="hidden mb-8">
            <div class="bg-red-50 border border-red-200 rounded-xl p-4 flex items-start gap-4">
                <svg class="w-6 h-6 text-red-600 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                <div>
                    <h3 class="font-bold text-red-900">Audit Failed</h3>
                    <p id="errorMessage" class="text-sm text-red-700 mt-1">Connection error</p>
                </div>
            </div>
        </div>

        <!-- Dynamic Results Container -->
        <div id="resultsSection" class="hidden space-y-8">
        </div>
    </main>

    <footer class="mt-auto border-t border-slate-200 py-12 bg-white">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-slate-400 text-xs font-medium">
                Guardrails Analysis <span class="mx-2">•</span> v3.0 Itadori <span class="mx-2">•</span> <a href="#" class="hover:text-indigo-600 transition-colors">Documentation</a>
            </p>
        </div>
    </footer>

</body>
</html>
