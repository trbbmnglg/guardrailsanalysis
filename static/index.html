<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardrails Analysis v3.0</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script>
        tailwind.config = {
          theme: {
            extend: {
              fontFamily: {
                sans: ['"Inter"', 'sans-serif'],
                heading: ['"Plus Jakarta Sans"', 'sans-serif'],
                mono: ['"JetBrains Mono"', 'monospace'],
              },
              boxShadow: {
                'sidebar': '-4px 0 15px rgba(0, 0, 0, 0.05)',
              }
            }
          }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; } /* Prevent body scroll, handle in panels */
        
        /* Custom Scrollbar for panels */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }

        /* Accordion Transitions */
        .accordion-content { transition: max-height 0.3s ease-out, opacity 0.3s ease-out; max-height: 0; opacity: 0; overflow: hidden; }
        .accordion-content.open { max-height: 1000px; opacity: 1; }
        .rotate-icon { transition: transform 0.3s ease; }
        .rotate-icon.open { transform: rotate(180deg); }

        /* Loading Animation */
        .loading-shimmer {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        /* Fade In */
        .fade-in { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script src="/static/disclaimer-modal.js"></script>
    <script src="/static/latency-profiler.js"></script>
    <script src="/static/green-ai-monitor.js"></script>
    <script src="/static/guardrails-analyzer.js" defer></script>
</head>

<body class="bg-slate-50 text-slate-900 flex h-screen w-full">

    <main class="flex-1 h-full flex flex-col relative min-w-0 transition-all duration-300">
        
        <header class="h-16 border-b border-slate-200 bg-white/80 backdrop-blur-md flex items-center justify-between px-8 z-10 sticky top-0">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-600 to-blue-600 flex items-center justify-center shadow-sm text-white">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                </div>
                <div>
                    <h1 class="font-heading font-bold text-slate-800 text-lg leading-none">Guardrails Analysis</h1>
                    <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">v3.0 Itadori</span>
                </div>
            </div>
            
            <div class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-50 border border-emerald-100">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span class="text-xs font-bold text-emerald-700 uppercase">System Ready</span>
            </div>
        </header>

        <div id="mainResultArea" class="flex-1 overflow-y-auto custom-scroll p-8 pb-20">
            
            <div id="emptyState" class="h-full flex flex-col items-center justify-center text-center opacity-60">
                <div class="w-24 h-24 bg-slate-100 rounded-full flex items-center justify-center mb-6">
                    <svg class="w-10 h-10 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>
                </div>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">Ready to Analyze</h2>
                <p class="text-slate-500 max-w-md">Open the <strong class="text-indigo-600">Control Panel</strong> on the right to input your agent instructions and start the audit.</p>
                <button onclick="toggleSidebar(true)" class="mt-6 px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg shadow-md transition-colors">
                    Open Controls &rarr;
                </button>
            </div>

            <div id="loadingState" class="hidden animate-in fade-in zoom-in duration-300">
                <div class="bg-white rounded-2xl shadow-lg border border-indigo-100 p-12 text-center max-w-2xl mx-auto mt-10">
                    <div class="relative w-20 h-20 mx-auto mb-6">
                        <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-indigo-600 rounded-full border-t-transparent animate-spin"></div>
                    </div>
                    <h3 class="text-xl font-bold text-slate-900 mb-2">Auditing Agents...</h3>
                    <p class="text-slate-500 mb-8" id="progressText">Initializing CrewAI Swarm</p>
                    <div class="max-w-md mx-auto h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div id="progressBar" class="h-full bg-indigo-600 loading-bar-striped animate-pulse transition-all duration-300" style="width: 5%"></div>
                    </div>
                </div>
            </div>

            <div id="errorState" class="hidden mb-8 max-w-4xl mx-auto">
                <div class="bg-red-50 border border-red-200 rounded-xl p-4 flex items-start gap-4">
                    <svg class="w-6 h-6 text-red-600 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                    <div>
                        <h3 class="font-bold text-red-900">Audit Failed</h3>
                        <p id="errorMessage" class="text-sm text-red-700 mt-1">Connection error</p>
                    </div>
                </div>
            </div>

            <div class="space-y-8 max-w-6xl mx-auto">
                <div id="executive-summary"></div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div id="greenAISection" class="hidden h-full"></div>
                    <div id="latencyReportSection" class="hidden h-full"></div>
                </div>

                <div id="resultsSection" class="hidden space-y-8">
                    </div>
            </div>

        </div>
    </main>

    <aside class="h-full flex z-50 shadow-sidebar bg-white relative">
        
        <div class="w-16 h-full border-l border-slate-200 bg-white flex flex-col items-center py-6 gap-6 z-20">
            <button onclick="toggleSidebar()" class="p-2 rounded-lg bg-slate-100 text-slate-500 hover:bg-indigo-50 hover:text-indigo-600 transition-colors mb-4">
                <svg id="sidebarToggleIcon" class="w-5 h-5 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
                </svg>
            </button>

            <button onclick="openPanel('instruction')" class="nav-icon group relative p-3 rounded-xl hover:bg-slate-50 text-slate-400 hover:text-indigo-600 transition-all" title="Instructions">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                <span class="absolute right-full mr-2 top-1/2 -translate-y-1/2 px-2 py-1 bg-slate-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 pointer-events-none whitespace-nowrap transition-opacity">Instruction</span>
            </button>

            <button onclick="openPanel('auth')" class="nav-icon group relative p-3 rounded-xl hover:bg-slate-50 text-slate-400 hover:text-amber-600 transition-all" title="Authentication">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
                <span class="absolute right-full mr-2 top-1/2 -translate-y-1/2 px-2 py-1 bg-slate-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 pointer-events-none whitespace-nowrap transition-opacity">Auth</span>
            </button>

            <button onclick="openPanel('config')" class="nav-icon group relative p-3 rounded-xl hover:bg-slate-50 text-slate-400 hover:text-blue-600 transition-all" title="Configuration">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4" /></svg>
                <span class="absolute right-full mr-2 top-1/2 -translate-y-1/2 px-2 py-1 bg-slate-800 text-white text-xs rounded opacity-0 group-hover:opacity-100 pointer-events-none whitespace-nowrap transition-opacity">Config</span>
            </button>

            <div class="mt-auto mb-4">
                <button id="miniRunBtn" onclick="triggerRun()" class="p-3 rounded-full bg-slate-900 text-white hover:bg-indigo-600 hover:shadow-lg hover:scale-110 transition-all duration-300">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /></svg>
                </button>
            </div>
        </div>

        <div id="expandablePanel" class="w-0 overflow-hidden bg-white border-l border-slate-100 transition-all duration-300 ease-in-out flex flex-col">
            <div class="p-6 h-full overflow-y-auto custom-scroll flex flex-col gap-4 min-w-[400px]">
                
                <h2 class="text-lg font-heading font-bold text-slate-800 mb-2">Control Center</h2>

                <div class="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                    <button onclick="toggleAccordion('accInstruction')" class="w-full px-4 py-3 bg-slate-50 hover:bg-slate-100 flex items-center justify-between transition-colors">
                        <div class="flex items-center gap-2 font-bold text-slate-700 text-sm">
                            <svg class="w-4 h-4 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                            Agent Instruction
                        </div>
                        <svg id="icon-accInstruction" class="w-4 h-4 text-slate-400 rotate-icon open" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </button>
                    <div id="accInstruction" class="accordion-content open bg-white">
                        <div class="p-4">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs text-slate-400 font-mono">Character Count: <span id="charCount">0</span></span>
                                <button onclick="document.getElementById('instructionInput').value=''" class="text-[10px] text-red-400 hover:text-red-600 uppercase font-bold">Clear</button>
                            </div>
                            <textarea id="instructionInput" 
                                class="w-full h-[350px] p-4 rounded-lg border border-slate-200 text-sm font-mono leading-relaxed text-slate-600 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 transition-all resize-none outline-none"
                                placeholder="Paste your System Prompt here..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                    <button onclick="toggleAccordion('accAuth')" class="w-full px-4 py-3 bg-slate-50 hover:bg-slate-100 flex items-center justify-between transition-colors">
                        <div class="flex items-center gap-2 font-bold text-slate-700 text-sm">
                            <svg class="w-4 h-4 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
                            Authentication
                        </div>
                        <svg id="icon-accAuth" class="w-4 h-4 text-slate-400 rotate-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </button>
                    <div id="accAuth" class="accordion-content bg-white">
                        <div class="p-4 space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1.5">HuggingFace Token</label>
                                <input type="password" id="apiKey" 
                                    class="w-full px-3 py-2 rounded-lg border border-slate-200 bg-slate-50 text-sm focus:ring-2 focus:ring-amber-100 focus:border-amber-400 transition-all font-mono placeholder:text-slate-300"
                                    placeholder="hf_...">
                            </div>
                            <div class="flex items-center justify-between">
                                <label class="flex items-center gap-2 cursor-pointer select-none">
                                    <input type="checkbox" id="saveApiKey" class="w-4 h-4 text-amber-500 rounded border-gray-300 focus:ring-amber-500">
                                    <span class="text-xs text-slate-600 font-medium">Remember Key</span>
                                </label>
                                <button id="clearApiKey" class="text-[10px] font-bold text-slate-400 hover:text-red-500 uppercase">Clear</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                    <button onclick="toggleAccordion('accConfig')" class="w-full px-4 py-3 bg-slate-50 hover:bg-slate-100 flex items-center justify-between transition-colors">
                        <div class="flex items-center gap-2 font-bold text-slate-700 text-sm">
                            <svg class="w-4 h-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                            Analysis Config
                        </div>
                        <svg id="icon-accConfig" class="w-4 h-4 text-slate-400 rotate-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                    </button>
                    <div id="accConfig" class="accordion-content bg-white">
                        <div class="p-4 space-y-3">
                            <label class="flex items-center justify-between p-2 rounded-lg hover:bg-slate-50 cursor-pointer">
                                <div>
                                    <span class="text-sm font-bold text-slate-700 block">Deep Compliance</span>
                                    <span class="text-[10px] text-slate-400">Strict regex & RAG checks</span>
                                </div>
                                <input type="checkbox" id="enableRagDeepScan" class="w-4 h-4 text-indigo-600 rounded border-gray-300" checked>
                            </label>
                            <label class="flex items-center justify-between p-2 rounded-lg hover:bg-slate-50 cursor-pointer">
                                <div>
                                    <span class="text-sm font-bold text-slate-700 block">FinOps Profiling</span>
                                    <span class="text-[10px] text-slate-400">Cost & Latency estimate</span>
                                </div>
                                <input type="checkbox" id="aiProfilingToggle" class="w-4 h-4 text-indigo-600 rounded border-gray-300" checked>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="pt-4 mt-auto">
                    <button id="analyzeBtn" class="w-full flex items-center justify-center gap-2 bg-slate-900 hover:bg-indigo-600 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-indigo-500/30 transition-all duration-300 transform active:scale-[0.98]">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        Run Audit
                    </button>
                </div>

            </div>
        </div>
    </aside>

    <script>
        let isSidebarOpen = false;

        function toggleSidebar(forceOpen = null) {
            const panel = document.getElementById('expandablePanel');
            const icon = document.getElementById('sidebarToggleIcon');
            
            if (forceOpen === true || (forceOpen === null && !isSidebarOpen)) {
                // Open
                panel.classList.remove('w-0');
                panel.classList.add('w-[450px]');
                icon.style.transform = 'rotate(180deg)';
                isSidebarOpen = true;
            } else {
                // Close
                panel.classList.add('w-0');
                panel.classList.remove('w-[450px]');
                icon.style.transform = 'rotate(0deg)';
                isSidebarOpen = false;
            }
        }

        function openPanel(section) {
            toggleSidebar(true);
            
            // Close all first (optional, cleaner look)
            // ['accInstruction', 'accAuth', 'accConfig'].forEach(id => {
            //     document.getElementById(id).classList.remove('open');
            //     document.getElementById('icon-' + id).classList.remove('open');
            // });

            // Open specific
            let targetId = '';
            if(section === 'instruction') targetId = 'accInstruction';
            if(section === 'auth') targetId = 'accAuth';
            if(section === 'config') targetId = 'accConfig';
            
            const content = document.getElementById(targetId);
            const icon = document.getElementById('icon-' + targetId);
            
            if (content && !content.classList.contains('open')) {
                content.classList.add('open');
                if(icon) icon.classList.add('open');
            }
        }

        function toggleAccordion(id) {
            const content = document.getElementById(id);
            const icon = document.getElementById('icon-' + id);
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.classList.remove('open');
            } else {
                content.classList.add('open');
                icon.classList.add('open');
            }
        }

        // Proxy function for the mini Run button to click the real button
        function triggerRun() {
            document.getElementById('analyzeBtn').click();
        }

        // Hide Empty State when results arrive
        const originalDisplayResults = window.displayResults; // Hook into existing logic if possible
        
        // Listen for the analysis start to show results area
        document.getElementById('analyzeBtn').addEventListener('click', () => {
            document.getElementById('emptyState').classList.add('hidden');
            // Auto close sidebar on mobile or smaller screens? Optional.
        });
    </script>

</body>
</html>
