<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Guardrails Analyzer v2</title>
    <script>
        // Global error handler to catch unhandled promise rejections
          window.addEventListener('unhandledrejection', function(event) {
              console.error('🚨 Unhandled Promise Rejection:', event.reason);
              
              // Prevent default browser error handling
              event.preventDefault();
              
              // Show user-friendly error if it's not a browser extension issue
              if (!event.reason?.message?.includes('message channel closed')) {
                  const errorState = document.getElementById('errorState');
                  const errorMessage = document.getElementById('errorMessage');
                  if (errorState && errorMessage) {
                      errorMessage.textContent = 'An unexpected error occurred. Please try again.';
                      errorState.classList.remove('hidden');
                  }
              }
          });
          
          // Catch synchronous errors too
          window.addEventListener('error', function(event) {
              // Ignore browser extension errors
              if (event.message.includes('Extension context') || 
                  event.message.includes('message channel')) {
                  console.warn('Ignoring browser extension error');
                  event.preventDefault();
                  return;
              }
              
              console.error('🚨 Global Error:', event.error);
