<script>
        let isDrawerOpen = false;
        let currentSection = null;

        function handleNavClick(section) {
            const drawer = document.getElementById('controlDrawer');
            const drawerTitle = document.getElementById('drawerTitle');
            const sections = ['instruction', 'auth', 'config'];
            const titles = {
                'instruction': 'Agent Instruction',
                'auth': 'Authentication',
                'config': 'Analysis Configuration'
            };

            // 1. If clicking same section that is open -> Close it
            if (isDrawerOpen && currentSection === section) {
                closeDrawer();
                return;
            }

            // 2. Open Logic
            // Reset all icons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-50', 'text-indigo-600', 'border-r-4', 'border-indigo-600');
                btn.classList.add('text-slate-400');
            });

            // Highlight Active Icon
            const activeBtn = document.getElementById('btn-' + section);
            if(activeBtn) {
                activeBtn.classList.remove('text-slate-400');
                activeBtn.classList.add('bg-indigo-50', 'text-indigo-600', 'border-r-4', 'border-indigo-600');
            }

            // Set Title
            drawerTitle.textContent = titles[section];

            // Toggle Contents (Exclusive View)
            sections.forEach(sec => {
                const el = document.getElementById('content-' + sec);
                if (sec === section) {
                    el.classList.remove('hidden');
                } else {
                    el.classList.add('hidden');
                }
            });

            // Animate Drawer Open
            if (!isDrawerOpen) {
                drawer.classList.remove('w-0');
                drawer.classList.add('w-[450px]');
                isDrawerOpen = true;
            }
            
            currentSection = section;
        }

        function closeDrawer() {
            const drawer = document.getElementById('controlDrawer');
            
            // Animate Close
            drawer.classList.remove('w-[450px]');
            drawer.classList.add('w-0');
            isDrawerOpen = false;
            currentSection = null;

            // Remove active styling from icons
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-50', 'text-indigo-600', 'border-r-4', 'border-indigo-600');
                btn.classList.add('text-slate-400');
            });
        }

        // --- UPDATED LOGIC: HIDE EMPTY STATE & CLOSE DRAWER ---
        // Hook into the analyze button to update UI state immediately
        document.getElementById('analyzeBtn').addEventListener('click', () => {
            const key = document.getElementById('apiKey').value;
            const inst = document.getElementById('instructionInput').value;
            
            // Only proceed if input is potentially valid
            if (key && inst) {
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('loadingState').classList.remove('hidden');
                
                // === NEW LINE: Minimize the sidebar immediately ===
                closeDrawer(); 
            }
        });

        // Run Button Proxy
        function triggerRun() {
            // Check if open, if not open Instruction first
            if (!isDrawerOpen) {
                handleNavClick('instruction');
                return;
            }
            const btn = document.getElementById('analyzeBtn');
            if(btn) btn.click();
        }
    </script>
